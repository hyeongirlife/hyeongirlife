<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lee Hyeongeol | Side Project Preview</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #030304;
        --ink: #f7f2e8;
        --muted: rgba(247, 242, 232, 0.66);
        --line: rgba(247, 242, 232, 0.14);
        --line-strong: rgba(247, 242, 232, 0.28);
        --gold: #f5b04a;
        --amber: #d77837;
        --cyan: #59d9e8;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow-x: hidden;
        background: var(--bg);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", "Apple SD Gothic Neo", sans-serif;
        letter-spacing: 0;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .profile-page {
        position: relative;
        min-height: 100vh;
        padding: clamp(28px, 6vw, 76px);
        isolation: isolate;
        background:
          radial-gradient(circle at 78% 72%, rgba(244, 160, 66, 0.14), transparent 31vw),
          radial-gradient(circle at 26% 18%, rgba(94, 129, 172, 0.12), transparent 30vw),
          #030304;
      }

      .profile-page::before,
      .profile-page::after,
      .star-field {
        position: fixed;
        inset: 0;
        pointer-events: none;
        content: "";
      }

      .profile-page::before {
        z-index: -3;
        background:
          radial-gradient(circle at 12% 18%, rgba(255, 255, 255, 0.82) 0 1px, transparent 1.8px),
          radial-gradient(circle at 32% 42%, rgba(255, 255, 255, 0.56) 0 1px, transparent 1.9px),
          radial-gradient(circle at 66% 22%, rgba(255, 255, 255, 0.72) 0 1px, transparent 1.8px),
          radial-gradient(circle at 78% 58%, rgba(255, 255, 255, 0.44) 0 1px, transparent 1.9px),
          radial-gradient(circle at 44% 78%, rgba(255, 255, 255, 0.5) 0 1px, transparent 1.9px);
        background-size: 420px 420px, 520px 520px, 460px 460px, 560px 560px, 500px 500px;
        opacity: 0.45;
      }

      .profile-page::after {
        z-index: -1;
        background: radial-gradient(circle at center, transparent 0 52%, rgba(0, 0, 0, 0.58) 100%);
      }

      .star-field {
        z-index: -2;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.045) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.045) 1px, transparent 1px);
        background-size: 72px 72px;
        mask-image: radial-gradient(circle at 40% 42%, black, transparent 72%);
        opacity: 0.4;
      }

      .profile-card {
        position: relative;
        z-index: 2;
        width: min(460px, 100%);
        min-height: calc(100vh - clamp(56px, 12vw, 152px));
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding-bottom: 24px;
      }

      .eyebrow {
        margin: 0 0 18px;
        color: rgba(245, 176, 74, 0.84);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(52px, 9vw, 106px);
        line-height: 0.96;
        font-weight: 760;
        letter-spacing: 0;
      }

      .english-name {
        margin: 14px 0 36px;
        color: var(--muted);
        font-size: clamp(18px, 2.4vw, 24px);
        line-height: 1.3;
      }

      .info-stack {
        display: grid;
        gap: 28px;
        width: min(410px, 100%);
      }

      .profile-section,
      .projects-section {
        display: grid;
        gap: 12px;
      }

      .section-title {
        margin: 0;
        color: rgba(247, 242, 232, 0.58);
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.18em;
        line-height: 1.2;
        text-transform: uppercase;
      }

      .service-links,
      .project-list {
        display: grid;
        gap: 12px;
      }

      .service-link {
        display: grid;
        grid-template-columns: 46px 1fr;
        align-items: center;
        gap: 14px;
        min-height: 62px;
        padding: 10px 14px 10px 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.035);
        backdrop-filter: blur(14px);
        transition:
          border-color 180ms ease,
          background 180ms ease,
          transform 180ms ease;
      }

      .service-link:hover,
      .service-link:focus-visible,
      .project-card-link:hover,
      .project-card-link:focus-visible {
        border-color: var(--line-strong);
        background: rgba(255, 255, 255, 0.07);
        transform: translateY(-2px);
        outline: none;
      }

      .service-link strong,
      .service-link small {
        display: block;
      }

      .service-link strong {
        font-size: 15px;
        line-height: 1.2;
      }

      .service-link small {
        margin-top: 4px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.2;
      }

      .icon-frame {
        position: relative;
        width: 38px;
        height: 38px;
        display: grid;
        place-items: center;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.13);
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.28);
        color: rgba(247, 242, 232, 0.86);
        font-size: 12px;
        font-weight: 800;
      }

      .project-card {
        display: grid;
        grid-template-columns: 34px 1fr;
        gap: 12px;
        min-height: 70px;
        padding: 12px 14px;
        border: 1px solid rgba(247, 242, 232, 0.1);
        border-radius: 8px;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.055), rgba(255, 255, 255, 0.018));
        backdrop-filter: blur(14px);
        transition:
          border-color 180ms ease,
          background 180ms ease,
          transform 180ms ease;
      }

      .project-card.featured {
        border-color: rgba(245, 176, 74, 0.28);
        background:
          linear-gradient(135deg, rgba(245, 176, 74, 0.12), rgba(89, 217, 232, 0.035)),
          linear-gradient(135deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.018));
        box-shadow: 0 20px 54px rgba(0, 0, 0, 0.22);
      }

      .project-index {
        color: rgba(245, 176, 74, 0.78);
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.08em;
        line-height: 1.3;
      }

      .project-card h3 {
        margin: 0;
        font-size: 14px;
        line-height: 1.25;
      }

      .project-card p {
        margin: 5px 0 0;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }

      .project-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 10px;
      }

      .project-meta span {
        border: 1px solid rgba(247, 242, 232, 0.12);
        border-radius: 999px;
        padding: 4px 7px;
        color: rgba(247, 242, 232, 0.7);
        background: rgba(0, 0, 0, 0.22);
        font-size: 10px;
        font-weight: 700;
      }

      .project-meta .live {
        color: #071111;
        border-color: rgba(245, 176, 74, 0.9);
        background: var(--gold);
      }

      .sun-system {
        position: fixed;
        right: clamp(24px, 7vw, 120px);
        bottom: clamp(28px, 8vw, 116px);
        width: clamp(250px, 31vw, 430px);
        aspect-ratio: 1;
        z-index: 1;
        pointer-events: none;
      }

      .sun {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 34%;
        aspect-ratio: 1;
        border-radius: 50%;
        background:
          radial-gradient(circle at 34% 30%, #fff2a8 0 9%, transparent 10%),
          radial-gradient(circle at 44% 42%, #ffd56b 0 22%, #f69b3c 48%, #a93b23 75%, #42130f 100%);
        box-shadow:
          0 0 26px rgba(247, 163, 57, 0.46),
          0 0 78px rgba(247, 134, 43, 0.34),
          inset -18px -22px 36px rgba(81, 17, 10, 0.42);
        animation: sunRotate 38s linear infinite;
        translate: -50% -50%;
      }

      .sun::before {
        position: absolute;
        inset: -10%;
        border-radius: inherit;
        background:
          repeating-conic-gradient(
            from 0deg,
            rgba(255, 210, 112, 0.18) 0deg 8deg,
            transparent 8deg 18deg
          );
        filter: blur(10px);
        content: "";
      }

      .orbit {
        --orbit-tilt: 90deg;
        position: absolute;
        left: 50%;
        top: 50%;
        border: 1px solid rgba(247, 242, 232, 0.13);
        border-radius: 50%;
        transform-origin: 50% 50%;
        animation-name: orbit;
        animation-timing-function: linear;
        animation-iteration-count: infinite;
        translate: -50% -50%;
      }

      .orbit-one {
        width: 42%;
        height: 68%;
        animation-duration: 34s;
      }

      .orbit-two {
        width: 58%;
        height: 88%;
        animation-duration: 54s;
        animation-direction: reverse;
      }

      .orbit-three {
        width: 74%;
        height: 108%;
        animation-duration: 76s;
      }

      .planet {
        position: absolute;
        top: 50%;
        left: 0;
        border-radius: 50%;
        box-shadow: 0 0 18px rgba(255, 255, 255, 0.12);
        translate: -50% -50%;
      }

      .planet-blue {
        width: 16px;
        height: 16px;
        background: radial-gradient(circle at 34% 30%, #d7f1ff 0 12%, #78aeca 42%, #24445c 100%);
      }

      .planet-stone {
        width: 10px;
        height: 10px;
        background: radial-gradient(circle at 35% 35%, #f1e3c5, #a99672 62%, #3f3428 100%);
      }

      .planet-rust {
        width: 13px;
        height: 13px;
        background: radial-gradient(circle at 35% 35%, #ffd0a6, #bd6747 58%, #502016 100%);
      }

      @keyframes sunRotate {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes orbit {
        from {
          transform: rotate(var(--orbit-tilt)) rotate(0deg);
        }
        to {
          transform: rotate(var(--orbit-tilt)) rotate(360deg);
        }
      }

      @media (max-width: 720px) {
        body {
          overflow: auto;
        }

        .profile-page {
          min-height: 100svh;
          padding: 34px 22px 190px;
        }

        .profile-card {
          min-height: auto;
          padding-top: 48px;
        }

        .english-name {
          margin-bottom: 32px;
        }

        .service-link {
          min-height: 58px;
        }

        .sun-system {
          width: 248px;
          right: 18px;
          bottom: 24px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 1ms !important;
          animation-iteration-count: 1 !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <main class="profile-page" aria-label="Lee Hyeongeol profile side project preview">
      <div class="star-field" aria-hidden="true"></div>
      <section class="profile-card" aria-labelledby="profile-name">
        <p class="eyebrow">Personal orbit</p>
        <h1 id="profile-name">이현걸</h1>
        <p class="english-name">Lee Hyeongeol</p>

        <div class="info-stack">
          <section class="profile-section" aria-labelledby="profile-links-title">
            <h2 class="section-title" id="profile-links-title">Profile</h2>

            <nav class="service-links" aria-label="Social links">
              <a class="service-link" href="https://www.instagram.com/hyeongirlife/" target="_blank" rel="noreferrer">
                <span class="icon-frame">IG</span>
                <span>
                  <strong>Instagram</strong>
                  <small>@hyeongirlife</small>
                </span>
              </a>

              <a class="service-link" href="https://blog.naver.com/boo1996" target="_blank" rel="noreferrer">
                <span class="icon-frame">NB</span>
                <span>
                  <strong>Naver Blog</strong>
                  <small>boo1996</small>
                </span>
              </a>

              <a class="service-link" href="https://www.linkedin.com/in/hyeongeol-lee-88511b230/" target="_blank" rel="noreferrer">
                <span class="icon-frame">IN</span>
                <span>
                  <strong>LinkedIn</strong>
                  <small>hyeongeol-lee</small>
                </span>
              </a>
            </nav>
          </section>

          <section class="projects-section" aria-labelledby="projects-title">
            <h2 class="section-title" id="projects-title">Side Projects</h2>

            <div class="project-list">
              <a class="project-card project-card-link featured" href="https://db-inspector.vercel.app" target="_blank" rel="noreferrer">
                <span class="project-index">01</span>
                <div>
                  <h3>Legacy DB Inspector</h3>
                  <p>오래된 DB 구조를 데이터 내용 없이 읽고, 로컬 AI로 자연어 질문에 근거와 함께 답하는 도구.</p>
                  <div class="project-meta" aria-label="프로젝트 태그">
                    <span class="live">Live</span>
                    <span>로컬 AI</span>
                    <span>구조 정보만</span>
                    <span>Docker</span>
                  </div>
                </div>
              </a>
            </div>
          </section>
        </div>
      </section>

      <section class="sun-system" aria-label="Animated solar system">
        <div class="orbit orbit-one">
          <span class="planet planet-blue"></span>
        </div>
        <div class="orbit orbit-two">
          <span class="planet planet-stone"></span>
        </div>
        <div class="orbit orbit-three">
          <span class="planet planet-rust"></span>
        </div>
        <div class="sun" aria-hidden="true"></div>
      </section>
    </main>
  </body>
</html>
